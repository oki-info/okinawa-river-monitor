<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>沖縄県 河川多画面モニター</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
  --ink:   #0b1118;
  --panel: #131c27;
  --card:  #182030;
  --edge:  rgba(255,255,255,.09);
  --teal:  #2dd4bf;
  --teal3: rgba(45,212,191,.15);
  --red:   #ef4444;
  --green: #22c55e;
  --amber: #f59e0b;
  --muted: #5a7080;
  --text:  #dde6ef;
  --mono:  'JetBrains Mono', monospace;
  --sans:  'Noto Sans JP', sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  display: flex; flex-direction: column;
  min-height: 100%;
}

/* ── HEADER ── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--edge);
  padding: 9px 14px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}
.h-brand { display: flex; align-items: center; gap: 9px; min-width: 0; }
.h-icon  {
  width: 32px; height: 32px; background: #0d9488;
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.h-title { font-size: 12px; font-weight: 700; color: var(--teal); letter-spacing: .08em; white-space: nowrap; }
.h-sub   { font-family: var(--mono); font-size: 8px; color: var(--muted); }
.h-right { text-align: right; flex-shrink: 0; }
.clock   { font-family: var(--mono); font-size: 16px; color: var(--teal); letter-spacing: .06em; }
.datestr { font-family: var(--mono); font-size: 8px; color: var(--muted); }

/* ── FETCH STATUS ── */
.fetch-bar {
  padding: 5px 14px;
  background: rgba(0,0,0,.25);
  border-bottom: 1px solid var(--edge);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  flex-shrink: 0;
}
.fb-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.fb-val   { font-family: var(--mono); font-size: 10px; color: var(--text); }
.fb-sep   { color: var(--edge); }
.pulse {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green);
  box-shadow: 0 0 5px var(--green); animation: pulse 3s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--panel);
  border-bottom: 1px solid var(--edge);
  padding: 7px 14px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  flex-shrink: 0;
}
.seg {
  display: flex; background: rgba(0,0,0,.3);
  border: 1px solid var(--edge); border-radius: 6px; overflow: hidden;
}
.seg-btn {
  padding: 5px 13px; background: transparent; border: none;
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all .15s;
}
.seg-btn + .seg-btn { border-left: 1px solid var(--edge); }
.seg-btn:hover  { color: var(--teal); }
.seg-btn.active { background: var(--teal3); color: var(--teal); }

.tbtn {
  padding: 5px 12px; background: transparent;
  border: 1px solid var(--edge); border-radius: 5px;
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.tbtn:hover { border-color: var(--teal); color: var(--teal); }

.ml-auto { margin-left: auto; }
.s-row { display: flex; align-items: center; gap: 8px; }
.s-pill { font-family: var(--mono); font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-ok  { background: var(--green); box-shadow: 0 0 5px #22c55e88; }
.dot-err { background: var(--red);   box-shadow: 0 0 5px #ef444488; }

/* ── GRID ── */
.workspace { flex: 1; padding: 8px; }
.grid { display: grid; gap: 8px; }
.grid.g1 { grid-template-columns: 1fr; }
.grid.g2 { grid-template-columns: 1fr 1fr; }
.grid.g4 { grid-template-columns: 1fr 1fr; }
.grid.g8 { grid-template-columns: repeat(4,1fr); }

@media (max-width: 640px) {
  .grid.g8 { grid-template-columns: 1fr 1fr; }
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--edge);
  border-radius: 10px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color .3s;
}
.card.ok  { border-color: rgba(34,197,94,.3); }
.card.err { border-color: rgba(239,68,68,.25); }

.card-head {
  padding: 5px 10px;
  background: rgba(0,0,0,.3);
  border-bottom: 1px solid var(--edge);
  display: flex; align-items: center; justify-content: space-between;
}
.card-river { font-size: 12px; font-weight: 700; }
.card-loc   { font-family: var(--mono); font-size: 8px; color: var(--muted); }
.live-badge {
  font-family: var(--mono); font-size: 8px; color: var(--muted);
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 4px var(--green);
  animation: pulse 3s infinite;
}

.card-img {
  position: relative; background: #0a0f16;
  aspect-ratio: 4/3; overflow: hidden; cursor: pointer;
}
.cam-img {
  width: 100%; height: 100%; object-fit: contain;
  display: block; transition: opacity .4s;
}
.state-ov {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.spin {
  width: 22px; height: 22px;
  border: 2px solid var(--edge); border-top-color: var(--teal);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-txt { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; line-height: 1.6; }

.img-bot {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 8px 5px;
  background: linear-gradient(transparent, rgba(0,0,0,.8));
  display: flex; justify-content: space-between; align-items: flex-end;
  pointer-events: none;
}
.ov-time { font-family: var(--mono); font-size: 8px; color: rgba(255,255,255,.4); }
.ov-pid  { font-family: var(--mono); font-size: 8px; color: rgba(45,212,191,.45); }

.card-foot {
  padding: 4px 10px;
  background: rgba(0,0,0,.2); border-top: 1px solid var(--edge);
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.foot-stamp { font-family: var(--mono); font-size: 8px; color: var(--muted); flex: 1; }
.foot-link  { font-family: var(--mono); font-size: 8px; color: rgba(45,212,191,.5); text-decoration: none; }
.foot-link:hover { color: var(--teal); }
.foot-retry { font-size: 11px; background: none; border: none; cursor: pointer; color: var(--muted); transition: color .15s; }
.foot-retry:hover { color: var(--teal); }

/* ── LIGHTBOX ── */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.93); z-index: 500;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 16px;
}
.lightbox.open { display: flex; }
.lb-img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 6px; }
.lb-cap { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; }
.lb-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; }

/* ── FOOTER ── */
footer {
  background: var(--panel); border-top: 1px solid var(--edge);
  padding: 5px 14px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.foot-l, .foot-r { font-family: var(--mono); font-size: 9px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="h-brand">
    <div class="h-icon">🌊</div>
    <div>
      <div class="h-title">沖縄県 河川多画面モニター</div>
      <div class="h-sub">GitHub Actions が10分ごとに自動取得 → GitHub Pages で配信</div>
    </div>
  </div>
  <div class="h-right">
    <div class="clock"   id="clock">--:--:--</div>
    <div class="datestr" id="datestr">---- / -- / --</div>
  </div>
</header>

<!-- 取得状況バー -->
<div class="fetch-bar">
  <span class="pulse"></span>
  <span class="fb-label">最終取得（JST）:</span>
  <span class="fb-val" id="fb-time">読込中…</span>
  <span class="fb-sep">|</span>
  <span class="fb-label">GitHub Actions が自動更新</span>
</div>

<div class="toolbar">
  <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">表示:</span>
  <div class="seg">
    <button class="seg-btn" id="btn1" onclick="setMode(1)">１画面</button>
    <button class="seg-btn" id="btn2" onclick="setMode(2)">２画面</button>
    <button class="seg-btn active" id="btn4" onclick="setMode(4)">４画面</button>
    <button class="seg-btn" id="btn8" onclick="setMode(8)">８画面</button>
  </div>
  <button class="tbtn" onclick="reloadAll()">↺ 今すぐ更新</button>
  <div class="ml-auto s-row">
    <div class="s-pill"><div class="dot dot-ok"></div><span id="cnt-ok">0</span> 表示中</div>
    <div class="s-pill"><div class="dot dot-err"></div><span id="cnt-err">0</span> エラー</div>
  </div>
</div>

<div class="workspace">
  <div class="grid g4" id="grid"></div>
</div>

<div class="lightbox" id="lb" onclick="closeLb()">
  <button class="lb-close">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
</div>

<footer>
  <div class="foot-l">沖縄県庁 土木建築部 河川課 ｜ 出典: bousai-kasen.pref.okinawa.jp</div>
  <div class="foot-r" id="foot-r">次回ページ更新: --:--</div>
</footer>

<script>
const CAMERAS = [
  { pid:'05', name:'安里川',  loc:'那覇市安里・豊橋',           c:'5'  },
  { pid:'16', name:'国場川',  loc:'那覇市古波蔵・漫湖公園',      c:'16' },
  { pid:'22', name:'安謝川',  loc:'那覇市古島・末吉西公園',      c:'21' },
  { pid:'44', name:'比謝川',  loc:'沖縄市城前町・水辺プラザ',    c:'42' },
  { pid:'19', name:'国場川',  loc:'南風原町宮平・安里又川合流',   c:'19' },
  { pid:'23', name:'安謝川',  loc:'那覇市首里石嶺町・新開橋',    c:'23' },
  { pid:'17', name:'国場川',  loc:'那覇市鏡原・宮平川合流',      c:'17' },
  { pid:'24', name:'安謝川',  loc:'那覇市首里末吉町・末吉',      c:'24' },
];

const CAM_PAGE = 'http://bousai-kasen.pref.okinawa.jp/river/kasen/cam.html?g=32&k=99&s=1&i=10&n=10&p=-1&a=0&f=0&r=90341001&c=';

let mode = 4;
let nextAt = null;
let lbIdx = null;
const st = {};

function pad(p) { return String(p).padStart(2,'0'); }
function fmt(n) { return String(n).padStart(2,'0'); }
function esc(s) { return String(s).replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// GitHub Pages の同リポジトリから画像を読む
// キャッシュ回避のため ?t=タイムスタンプ を付ける
function imgSrc(pid) {
  return `img_cam/p-${pad(pid)}.jpg?t=${Date.now()}`;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = 'grid g' + mode;

  for (let i = 0; i < mode; i++) {
    const cam = CAMERAS[i];
    if (!cam) continue;
    const d = document.createElement('div');
    d.className = 'card';
    d.id = 'card-' + i;
    d.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-river">🌊 ${esc(cam.name)}</div>
          <div class="card-loc">${esc(cam.loc)}</div>
        </div>
        <div class="live-badge"><div class="live-dot"></div>10分更新</div>
      </div>
      <div class="card-img">
        <div class="state-ov" id="ld-${i}">
          <div class="spin"></div>
          <div class="state-txt">読込中…</div>
        </div>
        <div class="state-ov" id="er-${i}" style="display:none">
          <div style="font-size:22px;opacity:.2">📡</div>
          <div class="state-txt">
            画像未取得<br>
            <span style="color:rgba(245,158,11,.7)">GitHub Actions の実行を確認してください</span>
          </div>
          <button onclick="retry(${i})"
            style="margin-top:4px;padding:5px 14px;background:var(--teal3);border:1px solid rgba(45,212,191,.4);border-radius:5px;color:var(--teal);font-family:var(--mono);font-size:10px;cursor:pointer">
            ↺ 再取得
          </button>
        </div>
        <img class="cam-img" id="img-${i}" style="opacity:0" src=""
             onload="imgOK(${i})" onerror="imgNG(${i})" onclick="openLb(${i})">
        <div class="img-bot">
          <span class="ov-time" id="ov-${i}">—</span>
          <span class="ov-pid">p-${pad(cam.pid)}</span>
        </div>
      </div>
      <div class="card-foot">
        <span class="foot-stamp" id="st-${i}">—</span>
        <a class="foot-link" href="${CAM_PAGE}${cam.c}" target="_blank">公式サイト↗</a>
        <button class="foot-retry" onclick="retry(${i})">↺</button>
      </div>`;
    grid.appendChild(d);
    st[i] = 'loading';
    setTimeout(() => loadImg(i), i * 200);
  }
  updateCounts();
}

function loadImg(i) {
  const img = document.getElementById('img-' + i);
  if (img) img.src = imgSrc(CAMERAS[i].pid);
}

function imgOK(i) {
  const img = document.getElementById('img-' + i);
  const ld  = document.getElementById('ld-'  + i);
  const card= document.getElementById('card-'+ i);
  if (img)  img.style.opacity = '1';
  if (ld)   ld.style.display  = 'none';
  if (card) card.className    = 'card ok';
  st[i] = 'ok';
  const now = new Date();
  const ts  = fmt(now.getHours())+':'+fmt(now.getMinutes())+':'+fmt(now.getSeconds());
  const ov  = document.getElementById('ov-' + i);
  const s   = document.getElementById('st-' + i);
  if (ov) ov.textContent = ts;
  if (s)  s.textContent  = '更新: ' + fmt(now.getHours())+':'+fmt(now.getMinutes());
  updateCounts();
}

function imgNG(i) {
  const img  = document.getElementById('img-'  + i);
  const ld   = document.getElementById('ld-'   + i);
  const er   = document.getElementById('er-'   + i);
  const card = document.getElementById('card-' + i);
  if (ld)   ld.style.display  = 'none';
  if (img)  img.style.display = 'none';
  if (er)   er.style.display  = 'flex';
  if (card) card.className    = 'card err';
  st[i] = 'error';
  updateCounts();
}

function retry(i) {
  const img  = document.getElementById('img-'  + i);
  const ld   = document.getElementById('ld-'   + i);
  const er   = document.getElementById('er-'   + i);
  const card = document.getElementById('card-' + i);
  if (er)   er.style.display  = 'none';
  if (ld)   ld.style.display  = 'flex';
  if (img)  { img.style.display='block'; img.style.opacity='0'; }
  if (card) card.className    = 'card';
  st[i] = 'loading';
  updateCounts();
  loadImg(i);
}

function reloadAll() {
  for (let i = 0; i < mode; i++) retry(i);
  nextAt = Date.now() + 10 * 60 * 1000;
}

function updateCounts() {
  let ok=0, err=0;
  for (let i=0; i<mode; i++) {
    if (!CAMERAS[i]) continue;
    if (st[i] === 'ok')    ok++;
    if (st[i] === 'error') err++;
  }
  document.getElementById('cnt-ok').textContent  = ok;
  document.getElementById('cnt-err').textContent = err;
}

function setMode(n) {
  mode = n;
  [1,2,4,8].forEach(v => document.getElementById('btn'+v).classList.toggle('active', v===n));
  render();
}

// status.json を読んで取得日時を表示
function loadStatus() {
  fetch('status.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      document.getElementById('fb-time').textContent = data.last_fetch_jst || '—';
    })
    .catch(() => {
      document.getElementById('fb-time').textContent = '(まだ実行されていません)';
    });
}

// ライトボックス
function openLb(i) {
  if (st[i] !== 'ok') return;
  const img = document.getElementById('img-' + i);
  document.getElementById('lb-img').src = img.src;
  document.getElementById('lb-cap').textContent = CAMERAS[i].name + ' — ' + CAMERAS[i].loc;
  document.getElementById('lb').classList.add('open');
  lbIdx = i;
}
function closeLb() {
  document.getElementById('lb').classList.remove('open');
  lbIdx = null;
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowRight' && lbIdx !== null) openLb((lbIdx+1) % mode);
  if (e.key === 'ArrowLeft'  && lbIdx !== null) openLb((lbIdx-1+mode) % mode);
});

// 時計
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent   = fmt(n.getHours())+':'+fmt(n.getMinutes())+':'+fmt(n.getSeconds());
  document.getElementById('datestr').textContent = n.getFullYear()+' / '+fmt(n.getMonth()+1)+' / '+fmt(n.getDate());
  if (nextAt) {
    const s = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
    document.getElementById('foot-r').textContent = '次回ページ更新: '+fmt(Math.floor(s/60))+':'+fmt(s%60);
  }
}

// ページを10分ごとに自動リロード（GitHub Actionsの更新に合わせる）
setTimeout(() => location.reload(), 10 * 60 * 1000);
nextAt = Date.now() + 10 * 60 * 1000;

setMode(4);
loadStatus();
setInterval(loadStatus, 60 * 1000);
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
