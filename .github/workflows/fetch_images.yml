name: 河川カメラ画像取得

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 画像取得とJSON記録
        run: |
          mkdir -p img_cam
          BASE="http://bousai-kasen.pref.okinawa.jp/river/kasen/img_cam"

          for N in $(seq -w 1 99); do
            PID=$(printf "%02d" $N)
            curl -sf --max-time 10 --retry 1 \
              -H "Referer: http://bousai-kasen.pref.okinawa.jp/" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/p-${PID}.jpg" \
              "${BASE}/p-${PID}.jpg" && echo "OK: p-${PID}" || rm -f "img_cam/p-${PID}.jpg"
          done

          echo "=== 取得成功一覧 ==="
          ls img_cam/

      - name: cameras.json を生成
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)

          # 取得できた画像からカメラリストを作成
          files = sorted(glob.glob('img_cam/p-*.jpg'))
          cameras = []
          for f in files:
              pid = os.path.basename(f).replace('p-','').replace('.jpg','')
              size = os.path.getsize(f)
              # 100バイト未満はエラー画像の可能性があるのでスキップ
              if size > 100:
                  cameras.append({'pid': pid, 'size': size})

          status = {
              'last_fetch_jst': now.strftime('%Y-%m-%d %H:%M:%S'),
              'camera_count': len(cameras),
              'cameras': cameras
          }
          with open('cameras.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)

          print(f"有効カメラ数: {len(cameras)}")
          for c in cameras:
              print(f"  p-{c['pid']} ({c['size']} bytes)")
          PYEOF

      - name: コミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img_cam/ cameras.json
          git diff --staged --quiet || git commit -m "🌊 河川画像更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST" && git push
