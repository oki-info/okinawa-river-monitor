name: 河川カメラ画像取得

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 画像取得とJSON記録
        run: |
          mkdir -p img_cam
          BASE="http://bousai-kasen.pref.okinawa.jp/river/kasen/img_cam"
          CAMERAS="05 16 22 44 19 23 17 24"
          for PID in $CAMERAS; do
            curl -sf --max-time 15 --retry 2 \
              -H "Referer: http://bousai-kasen.pref.okinawa.jp/" \
              -H "User-Agent: Mozilla/5.0" \
              -o "img_cam/p-${PID}.jpg" \
              "${BASE}/p-${PID}.jpg" && echo "OK: p-${PID}" || echo "NG: p-${PID}"
          done

      - name: status.json を生成
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta
          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST)
          cameras = ['05','16','22','44','19','23','17','24']
          result = []
          for pid in cameras:
              path = f'img_cam/p-{pid}.jpg'
              exists = os.path.exists(path)
              size = os.path.getsize(path) if exists else 0
              result.append({'pid': pid, 'ok': exists, 'size': size})
          status = {
              'last_fetch_jst': now.strftime('%Y-%m-%d %H:%M:%S'),
              'cameras': result
          }
          with open('status.json', 'w') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
          print(json.dumps(status, ensure_ascii=False, indent=2))
          PYEOF

      - name: コミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img_cam/ status.json
          git diff --staged --quiet || git commit -m "🌊 河川画像更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST" && git push
